<script>
  window.articles = <?= $articles_json ?>;

  const allArticles = window.articles;

  const articlesPerPage = 12;
  let currentPage = 1;

  const grid = document.getElementById('magazineGrid');
  const pageInfo = document.getElementById('pageInfo');
  const pageButtons = document.getElementById('pageButtons');

  function render() {
    const totalPages = Math.ceil(allArticles.length / articlesPerPage);
    const start = (currentPage - 1) * articlesPerPage;
    const pageArticles = allArticles.slice(start, start + articlesPerPage);

    grid.innerHTML = pageArticles.map(article => {
      const url = 'article.php?id=' + article.id;
      const imgSrc = article.img || 'https://via.placeholder.com/300x200?text=Изображение+не+загружено';
      return `
        <article class="magazine-card" onclick="window.location='${url}'">
          <div class="card-image">
            <img src="${imgSrc}" alt="${article.title}" onerror="this.src='https://via.placeholder.com/300x200?text=Ошибка+загрузки'; this.onerror=null;">
            <span class="category-badge">${article.category.toUpperCase()}</span>
          </div>
          <div class="card-content">
            <h2>${article.title}</h2>
            <p>${article.excerpt}</p>
            <div class="card-meta">
              <span>Текст: ${article.author}</span>
              <span>Дата: ${article.created_at.split(' ')[0]}</span>
              <span>Чтение: 5 мин</span>
            </div>
          </div>
        </article>
      `;
    }).join('');

    pageInfo.textContent = `Page ${currentPage} of ${totalPages || 1}`;
    pageButtons.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement('button');
      btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
      btn.textContent = i;
      btn.onclick = () => {
        currentPage = i;
        render();
      };
      pageButtons.appendChild(btn);
    }
  }

  render();
</script>
